<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mentor-Sub</title>
        <link rel="icon" type="image/x-icon" href="./asset/icon/favicon.svg" />

        <link rel="stylesheet" href="./style/variables.css" />
        <link rel="stylesheet" href="./style/fonts.css" />
        <link rel="stylesheet" href="./style/standard.css" />
        <link rel="stylesheet" href="./style/profile-cards.css" />
        <link rel="stylesheet" href="./style.css" />

        <script src="./script/database.js"></script>
        <script src="./script/templates-card.js"></script>
        <script src="./script/templates-dialog.js"></script>
        <script src="./script/dialog.js"></script>
        <script src="./script.js" defer></script>
    </head>
    <body onload="initPage(false)">
        <header class="header-main">
            <nav>
                <a href="#page-top" aria-label="go to top of page">
                    <div id="page-top">
                        <img src="./asset/icon/favicon.svg" alt="mentors-sub logo" />
                        <p><span>M</span>entor Sub</p>
                        <img class="infiction" src="./asset/icon/icon-in-fiction.svg" alt="stamp to logo " /></div
                ></a>
                <ul>
                    <li>
                        <button onclick="initPage(false)" aria-description="Show all mentors">
                            <span>M</span>entors
                        </button>
                    </li>
                    <li>
                        <button onclick="initPage(true)" aria-description="Show only favorite mentors">
                            <span>F</span>avorites
                        </button>
                    </li>
                    <li>
                        <div id="userLoginField" class="userLoginField userField">
                            <input
                                id="inputUserLogin"
                                type="text"
                                name="user name"
                                value="Guest"
                                aria-labelledby="login-button"
                            />
                            <button id="login-button" onclick="login(false)" aria-controls="userNameText">Login</button>
                        </div>
                        <div id="userLogoutField" class="userLogoutField userField">
                            <p id="userNameText" aria-labelledby="logout-button"></p>
                            <button id="logout-button" onclick="logout()" aria-controls="userNameText">Logout</button>
                        </div>
                    </li>
                </ul>
            </nav>
            <div class="header-circle"></div>
        </header>

        <main id="content-main">
            <dialog id="pictureDialog" onclick="closeDialog()" aria-labelledby="dialogTitle"></dialog>
        </main>

        <footer>
            <div>
                <p>© 2026 Sven Primus</p>
                <a href="https://github.com/svenprimus" target="_blank">
                    <p>GitHub<br />svenprimus</p>
                    <img src="./asset/img/impressum.jpg" alt="profil-picture of website developer" />
                </a>
            </div>
            <div class="footer-circle"></div>
        </footer>
    </body>
</html>
